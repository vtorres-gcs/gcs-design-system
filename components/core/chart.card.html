<!-- @dsCard group="Components" viewport="800x960" name="Chart" subtitle="BarChart · LineChart · PieChart using GCS color tokens with hover tooltips." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&family=Yrsa:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px; background: var(--background); font-family: var(--font-sans); }
  h1 { font-family: var(--font-serif); font-size: 40px; font-weight: 400; margin: 0 0 6px; color: var(--foreground); }
  .desc { font-size: 14px; color: var(--muted-foreground); margin: 0 0 40px; }
  h2 { font-family: var(--font-serif); font-size: 26px; font-weight: 400; margin: 0 0 16px; color: var(--foreground); }
  .section { margin-bottom: 40px; }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 24px;
  }
  .divider { height: 1px; background: var(--border); margin: 4px 0 32px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { BarChart, LineChart, PieChart } = window.GCSDesignSystem_43c089;

const monthly = [
  { name: 'Jan', value: 65,  growth: 28 },
  { name: 'Feb', value: 78,  growth: 35 },
  { name: 'Mar', value: 92,  growth: 42 },
  { name: 'Apr', value: 85,  growth: 48 },
  { name: 'May', value: 110, growth: 55 },
  { name: 'Jun', value: 125, growth: 62 },
];

const series = [
  { key: 'value',  label: 'Value' },
  { key: 'growth', label: 'Growth' },
];

const countries = [
  { name: 'Portugal', value: 35 },
  { name: 'Spain',    value: 28 },
  { name: 'Greece',   value: 20 },
  { name: 'Malta',    value: 17 },
];

function Demo() {
  return (
    <div>
      <h1>Charts</h1>
      <p className="desc">Visual data components · hover for tooltips · GCS Night Blue + Electric Blue palette</p>

      <div className="section">
        <h2>Bar Chart</h2>
        <div className="chart-card">
          <BarChart data={monthly} series={series} xKey="name" />
        </div>
      </div>

      <div className="divider" />

      <div className="section">
        <h2>Line Chart</h2>
        <div className="chart-card">
          <LineChart data={monthly} series={series} xKey="name" />
        </div>
      </div>

      <div className="divider" />

      <div className="section">
        <h2>Pie Chart</h2>
        <div className="chart-card">
          <PieChart data={countries} nameKey="name" valueKey="value" size={260} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
