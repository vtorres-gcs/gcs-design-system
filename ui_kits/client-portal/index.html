/* ── Inline primitives (self-contained, no bundle needed) ── */
function Button({ variant='primary', size='md', disabled=false, loading=false,
  iconLeft, iconRight, fullWidth=false, type='button', onClick, children, style:sp={}, ...rest }) {
  const [h, sH] = React.useState(false);
  const dis = disabled || loading;
  const V = {
    primary:     { bg: h ? 'hsl(233 60% 26%)' : 'hsl(233 100% 17%)', color: '#fff',              border: 'none' },
    secondary:   { bg: h ? 'hsl(216 100% 55%)' : 'hsl(216 100% 62%)', color: '#fff',             border: 'none' },
    ghost:       { bg: h ? 'hsl(218 21% 93%)'  : 'transparent',        color: 'hsl(233 100% 17%)', border: 'none' },
    outline:     { bg: h ? 'hsl(218 21% 93%)'  : 'transparent',        color: 'hsl(220 43% 11%)', border: '1px solid hsl(216 100% 93%)' },
    destructive: { bg: h ? 'hsl(0 84% 50%)'    : 'hsl(0 84% 60%)',     color: '#fff',              border: 'none' },
  }[variant] || {};
  const S = { sm: { h: '32px', p: '0 12px', fs: '13px' }, md: { h: '40px', p: '0 16px', fs: '14px' }, lg: { h: '48px', p: '0 24px', fs: '16px' } }[size] || {};
  return (
    <button type={type} disabled={dis}
      onClick={!dis ? onClick : undefined}
      onMouseEnter={() => sH(true)} onMouseLeave={() => sH(false)}
      style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
        fontFamily: 'var(--font-sans)', fontSize: S.fs, fontWeight: 500, height: S.h, padding: S.p,
        background: V.bg, color: V.color, border: V.border, borderRadius: 0,
        cursor: dis ? 'not-allowed' : 'pointer', opacity: dis ? 0.5 : 1,
        transition: 'background 150ms', whiteSpace: 'nowrap', userSelect: 'none',
        width: fullWidth ? '100%' : 'auto', outline: 'none', ...sp }} {...rest}>
      {loading && <svg width="14" height="14" viewBox="0 0 14 14" style={{ animation: 'gcs-spin .75s linear infinite', flexShrink: 0 }}>
        <circle cx="7" cy="7" r="5" stroke="currentColor" strokeWidth="2" fill="none" strokeDasharray="20" strokeDashoffset="6" strokeLinecap="round" /></svg>}
      {!loading && iconLeft && <span style={{ display: 'flex', alignItems: 'center' }}>{iconLeft}</span>}
      {children}
      {iconRight && <span style={{ display: 'flex', alignItems: 'center' }}>{iconRight}</span>}
    </button>
  );
}

function Badge({ variant='default', size='md', dot=false, children, style:sp={} }) {
  const V = {
    default:     { bg: 'hsl(218 21% 93%)', color: 'hsl(221 13% 46%)' },
    primary:     { bg: 'hsl(233 100% 17%)', color: '#fff' },
    secondary:   { bg: 'hsl(216 100% 93%)', color: 'hsl(216 100% 35%)' },
    success:     { bg: 'hsl(142 71% 90%)',  color: 'hsl(142 71% 22%)' },
    warning:     { bg: 'hsl(38 92% 90%)',   color: 'hsl(38 60% 28%)' },
    destructive: { bg: 'hsl(0 84% 94%)',    color: 'hsl(0 72% 38%)' },
    outline:     { bg: 'transparent', color: 'hsl(220 43% 11%)', border: '1px solid hsl(216 100% 93%)' },
  }[variant] || {};
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: '5px',
      fontFamily: 'var(--font-sans)', fontSize: size === 'sm' ? '11px' : '12px', fontWeight: 500,
      letterSpacing: '0.02em', lineHeight: 1.4, padding: size === 'sm' ? '2px 7px' : '3px 10px',
      background: V.bg, color: V.color, border: V.border || 'none',
      borderRadius: '9999px', whiteSpace: 'nowrap', ...sp }}>
      {dot && <span style={{ width: '6px', height: '6px', borderRadius: '50%', background: 'currentColor', flexShrink: 0, opacity: 0.75 }} />}
      {children}
    </span>
  );
}

function Tag({ children, variant='default', size='md', dismissible=false, onDismiss, icon, style:sp={} }) {
  const [dh, sDh] = React.useState(false);
  const V = {
    default: { bg: 'hsl(218 21% 93%)', color: 'hsl(220 43% 11%)' },
    primary: { bg: 'hsl(215 100% 96%)', color: 'hsl(216 100% 35%)', border: '1px solid hsl(216 100% 93%)' },
    outline: { bg: 'transparent',        color: 'hsl(220 43% 11%)', border: '1px solid hsl(216 100% 93%)' },
    filled:  { bg: 'hsl(233 100% 17%)', color: '#fff' },
    success: { bg: 'hsl(142 71% 90%)',  color: 'hsl(142 71% 22%)' },
    warning: { bg: 'hsl(38 92% 90%)',   color: 'hsl(38 60% 28%)' },
  }[variant] || {};
  const sm = size === 'sm';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px',
      fontFamily: 'var(--font-sans)', fontSize: sm ? '11px' : '13px', fontWeight: 400,
      lineHeight: 1.4, padding: sm ? '2px 8px' : '4px 10px',
      background: V.bg, color: V.color, border: V.border || 'none', borderRadius: 0,
      whiteSpace: 'nowrap', ...sp }}>
      {icon && <span style={{ display: 'flex', alignItems: 'center', opacity: 0.7 }}>{icon}</span>}
      {children}
      {dismissible && <button type="button" onClick={onDismiss}
        onMouseEnter={() => sDh(true)} onMouseLeave={() => sDh(false)}
        style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: '14px', height: '14px', marginLeft: '2px', borderRadius: '50%', cursor: 'pointer',
          background: dh ? 'currentColor' : 'transparent', color: dh ? V.bg : 'currentColor',
          opacity: dh ? 1 : 0.5, border: 'none', padding: 0, fontFamily: 'inherit',
          fontSize: '12px', lineHeight: 1 }}>×</button>}
    </span>
  );
}

function Avatar({ src, name, size='md', shape='circle', style:sp={} }) {
  const [err, sErr] = React.useState(false);
  const S = { xs:{s:'24px',fs:'9px'}, sm:{s:'32px',fs:'12px'}, md:{s:'40px',fs:'14px'}, lg:{s:'48px',fs:'16px'}, xl:{s:'64px',fs:'20px'} }[size] || { s:'40px', fs:'14px' };
  const COLS = ['hsl(233 100% 17%)', 'hsl(216 100% 35%)', 'hsl(233 41% 34%)', 'hsl(216 100% 45%)', 'hsl(233 60% 26%)'];
  let h = 0;
  for (let i = 0; i < (name || '').length; i++) h = ((h << 5) - h + (name || '').charCodeAt(i)) | 0;
  const bg = COLS[Math.abs(h) % COLS.length];
  const parts = (name || '?').trim().split(/\s+/);
  const ini = parts.length > 1 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : (name || '?')[0].toUpperCase();
  return (
    <div style={{ width: S.s, height: S.s, borderRadius: shape === 'circle' ? '9999px' : '0',
      background: bg, color: '#fff', display: 'inline-flex', alignItems: 'center',
      justifyContent: 'center', fontFamily: 'var(--font-sans)', fontSize: S.fs,
      fontWeight: 600, letterSpacing: '0.03em', overflow: 'hidden', flexShrink: 0,
      userSelect: 'none', ...sp }} title={name}>
      {src && !err
        ? <img src={src} alt={name || 'avatar'} onError={() => sErr(true)} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
        : <span>{ini}</span>}
    </div>
  );
}

/* ── Status helpers ─────────────────────────────────── */
function StatusBadge({ status }) {
  const map = {
    'approved':      { v: 'success',     label: 'Approved' },
    'under-review':  { v: 'warning',     label: 'Under Review' },
    'docs-required': { v: 'destructive', label: 'Documents Required' },
    'verified':      { v: 'success',     label: 'Verified' },
    'pending':       { v: 'warning',     label: 'Pending Review' },
    'uploaded':      { v: 'secondary',   label: 'Uploaded' },
    'required':      { v: 'destructive', label: 'Required' },
  };
  const { v, label } = map[status] || { v: 'default', label: status };
  return <Badge variant={v} dot>{label}</Badge>;
}

function ProgressBar({ value }) {
  return (
    <div style={{ height: '4px', background: 'var(--muted)', width: '100%' }}>
      <div style={{
        height: '100%', width: `${value}%`,
        background: value === 100 ? 'var(--success)' : 'var(--secondary)',
        transition: 'width 0.3s ease',
      }} />
    </div>
  );
}

/* ── Header ─────────────────────────────────────────── */

      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
          <span style={{ fontSize: '13px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted-foreground)' }}>Applications</span>
          <button onClick={() => setPage('applications')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--secondary)', fontSize: '13px', fontFamily: 'var(--font-sans)', display: 'flex', alignItems: 'center', gap: '4px' }}>
            View All <Icon d={Icons.chevron} size={14} />
          </button>
        </div>
        <div style={{ background: 'var(--card)', border: '1px solid var(--border)' }}>
          {APPLICATIONS.map((app, i) => (
            <div key={app.id} style={{
              display: 'grid', gridTemplateColumns: '2fr 1fr 120px 1fr',
              alignItems: 'center', gap: '16px', padding: '14px 20px',
              borderBottom: i < APPLICATIONS.length - 1 ? '1px solid var(--border)' : 'none',
            }}>
              <div>
                <div style={{ fontSize: '14px', fontWeight: 500 }}>{app.programme}</div>
                <div style={{ fontSize: '11px', color: 'var(--muted-foreground)', fontFamily: 'var(--font-mono)', marginTop: '2px' }}>{app.id}</div>
              </div>
              <StatusBadge status={app.status} />
              <div>
                <ProgressBar value={app.progress} />
                <div style={{ fontSize: '11px', color: 'var(--muted-foreground)', marginTop: '4px' }}>{app.progress}% complete</div>
              </div>
              <div style={{ fontSize: '12px', color: 'var(--muted-foreground)' }}>
                Advisor: {app.advisor.split(' ')[0]}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Applications page ──────────────────────────────── */
function ApplicationsPage({ setPage }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <p style={{ fontSize: '14px', color: 'var(--muted-foreground)' }}>3 applications across 3 programmes</p>
        <Button variant="primary" size="sm">New Application</Button>
      </div>
      {APPLICATIONS.map(app => (
        <div key={app.id} style={{ background: 'var(--card)', border: '1px solid var(--border)', padding: '24px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '6px' }}>
                <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '20px', fontWeight: 400 }}>{app.programme}</h3>
                <StatusBadge status={app.status} />
              </div>
              <div style={{ fontSize: '12px', color: 'var(--muted-foreground)', fontFamily: 'var(--font-mono)' }}>{app.id}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '12px', color: 'var(--muted-foreground)' }}>Submitted {app.submitted}</div>
              <div style={{ fontSize: '12px', color: 'var(--muted-foreground)', marginTop: '2px' }}>Advisor: {app.advisor}</div>
            </div>
          </div>
          <div style={{ marginBottom: '12px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
              <span style={{ fontSize: '12px', color: 'var(--muted-foreground)' }}>Progress</span>
              <span style={{ fontSize: '12px', fontWeight: 500 }}>{app.progress}%</span>
            </div>
            <ProgressBar value={app.progress} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: '12px', borderTop: '1px solid var(--border)' }}>
            <div style={{ fontSize: '13px', color: app.status === 'docs-required' ? 'hsl(0 72% 38%)' : 'var(--muted-foreground)' }}>
              {app.status === 'docs-required' && <span style={{ marginRight: '6px' }}>⚠</span>}
              Next: {app.nextAction}
            </div>
            <div style={{ display: 'flex', gap: '8px' }}>
              {app.status === 'docs-required' && (
                <Button variant="primary" size="sm" onClick={() => setPage('documents')}>Upload Documents</Button>
              )}
              <Button variant="outline" size="sm">View Details</Button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── Documents page ─────────────────────────────────── */
function DocumentsPage() {
  const byApp = APPLICATIONS.reduce((acc, a) => { acc[a.programme] = []; return acc; }, {});
  DOCUMENTS.forEach(d => { if (byApp[d.app]) byApp[d.app].push(d); });

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
      {Object.entries(byApp).map(([appName, docs]) => (
        <div key={appName}>
          <div style={{ fontSize: '13px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted-foreground)', marginBottom: '10px' }}>{appName}</div>
          <div style={{ background: 'var(--card)', border: '1px solid var(--border)' }}>
            {docs.length === 0 ? (
              <div style={{ padding: '16px 20px', fontSize: '13px', color: 'var(--muted-foreground)', fontStyle: 'italic' }}>No documents required</div>
            ) : docs.map((doc, i) => (
              <div key={doc.name} style={{
                display: 'flex', alignItems: 'center', gap: '16px', padding: '14px 20px',
                borderBottom: i < docs.length - 1 ? '1px solid var(--border)' : 'none',
              }}>
                <span style={{ color: doc.status === 'verified' ? 'var(--success)' : doc.status === 'required' ? 'var(--destructive)' : 'var(--muted-foreground)' }}>
                  <Icon d={doc.status === 'required' ? Icons.alert : Icons.docs} size={16} />
                </span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: '14px', fontWeight: 400 }}>{doc.name}</div>
                  {doc.uploaded && <div style={{ fontSize: '11px', color: 'var(--muted-foreground)', marginTop: '2px' }}>Uploaded {doc.uploaded}</div>}
                </div>
                <StatusBadge status={doc.status} />
                {doc.status === 'required' && (
                  <Button variant="primary" size="sm">
                    <Icon d={Icons.upload} size={14} /> Upload
                  </Button>
                )}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── Consultations page ─────────────────────────────── */
function ConsultationsPage() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
        <Button variant="primary" size="sm">Book a Consultation</Button>
      </div>
      {CONSULTATIONS.map(c => (
        <div key={c.title} style={{ background: 'var(--card)', border: '1px solid var(--border)', padding: '20px 24px', display: 'flex', gap: '20px', alignItems: 'center' }}>
          <div style={{ width: '52px', height: '52px', background: 'var(--electric-blue-25)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--secondary)', flexShrink: 0 }}>
            <Icon d={Icons.calendar} size={24} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: '15px', fontWeight: 500, marginBottom: '4px' }}>{c.title}</div>
            <div style={{ fontSize: '13px', color: 'var(--muted-foreground)' }}>with {c.advisor} · {c.date} · {c.time} · {c.type}</div>
          </div>
          <Tag variant="primary">{c.type}</Tag>
          <Button variant="outline" size="sm">Join Call</Button>
        </div>
      ))}
    </div>
  );
}

/* ── Programmes page ─────────────────────────────────── */
const PROGRAMMES = [
  { name: 'Portugal Golden Visa', region: 'Europe', type: 'Residency', min: '€250,000', time: '6–8 months', popular: true },
  { name: 'Greek Golden Visa', region: 'Europe', type: 'Residency', min: '€250,000', time: '3–6 months', popular: true },
  { name: 'Malta CBI', region: 'Europe', type: 'Citizenship', min: '€600,000+', time: '12–14 months', popular: false },
  { name: 'St Kitts & Nevis CBI', region: 'Caribbean', type: 'Citizenship', min: '$150,000+', time: '3–6 months', popular: false },
];

function ProgrammesPage() {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
      {PROGRAMMES.map(p => (
        <div key={p.name} style={{ background: 'var(--card)', border: '1px solid var(--border)', padding: '20px 24px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
            <h3 style={{ fontFamily: 'var(--font-serif)', fontSize: '18px', fontWeight: 400 }}>{p.name}</h3>
            {p.popular && <Badge variant="primary" size="sm">Popular</Badge>}
          </div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
            <Tag variant="outline" size="sm">{p.region}</Tag>
            <Tag variant={p.type === 'Citizenship' ? 'filled' : 'primary'} size="sm">{p.type}</Tag>
          </div>
          <div style={{ display: 'flex', gap: '24px', marginBottom: '16px' }}>
            <div><div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted-foreground)', marginBottom: '2px' }}>Min. Investment</div><div style={{ fontSize: '14px', fontWeight: 500 }}>{p.min}</div></div>
            <div><div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted-foreground)', marginBottom: '2px' }}>Processing Time</div><div style={{ fontSize: '14px', fontWeight: 500 }}>{p.time}</div></div>
          </div>
          <div style={{ display: 'flex', gap: '8px', paddingTop: '12px', borderTop: '1px solid var(--border)' }}>
            <Button variant="primary" size="sm" fullWidth>Start Application</Button>
            <Button variant="ghost" size="sm">Details</Button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── App ──────────────────────────────────────────────── */
function App() {
  const [page, setPage] = React.useState('dashboard');

  const pages = {
    dashboard:    <Dashboard setPage={setPage} />,
    applications: <ApplicationsPage setPage={setPage} />,
    documents:    <DocumentsPage />,
    programmes:   <ProgrammesPage />,
    consultations:<ConsultationsPage />,
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar page={page} setPage={setPage} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <Header page={page} setPage={setPage} />
        <main style={{ flex: 1, overflow: 'auto', padding: '32px 40px', background: 'var(--background)' }}>
          {pages[page]}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
