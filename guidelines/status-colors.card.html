<!-- @dsCard group="Colors" viewport="700x120" name="Star & Status" subtitle="Star rating, success, warning, destructive tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); }
  .row { display: flex; gap: 12px; align-items: center; }
  .chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="row">
  <div class="chip" style="background:hsl(47 100% 90%); color:hsl(47 100% 28%);">
    <span class="dot" style="background:var(--star)"></span>
    Star / Rating
  </div>
  <div class="chip" style="background:hsl(142 71% 92%); color:hsl(142 71% 25%);">
    <span class="dot" style="background:var(--success)"></span>
    Success
  </div>
  <div class="chip" style="background:hsl(38 92% 92%); color:hsl(38 92% 28%);">
    <span class="dot" style="background:var(--warning)"></span>
    Warning
  </div>
  <div class="chip" style="background:hsl(0 84% 94%); color:hsl(0 84% 38%);">
    <span class="dot" style="background:var(--destructive)"></span>
    Destructive
  </div>
  <div class="chip" style="background:var(--electric-blue-25); color:hsl(216 100% 35%);">
    <span class="dot" style="background:var(--info)"></span>
    Info
  </div>
</div>
</body>
</html>
