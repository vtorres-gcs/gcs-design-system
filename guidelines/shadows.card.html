<!-- @dsCard group="Spacing" viewport="700x200" name="Shadows" subtitle="Shadow elevation scale — xs through 2xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 32px 24px; background: var(--muted); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card {
    background: var(--card);
    width: 72px; height: 52px;
  }
  .label { font-size: 9px; font-family: var(--font-mono); color: var(--muted-foreground); text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="card" style="box-shadow:none; border:1px solid var(--border)"></div>
    <span class="label">none</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-2xs)"></div>
    <span class="label">–2xs</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-xs)"></div>
    <span class="label">–xs</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-sm)"></div>
    <span class="label">–sm</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow)"></div>
    <span class="label">–base</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-md)"></div>
    <span class="label">–md</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-lg)"></div>
    <span class="label">–lg</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-xl)"></div>
    <span class="label">–xl</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:var(--shadow-2xl)"></div>
    <span class="label">–2xl</span>
  </div>
</div>
</body>
</html>
