<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--background); }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border); padding: 10px 0; }
  .row:last-child { border-bottom: none; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); width: 120px; flex-shrink: 0; }
  .sample { font-family: var(--font-serif); color: var(--foreground); }
</style>
</head>
<body>
  <div class="row">
    <span class="label">display-xl · 60px</span>
    <span class="sample" style="font-size:60px;line-height:64px;font-weight:400;letter-spacing:-0.025em;">Global Citizens</span>
  </div>
  <div class="row">
    <span class="label">display-l · 48px</span>
    <span class="sample" style="font-size:48px;line-height:54px;font-weight:400;letter-spacing:-0.025em;">Your Path to Residency</span>
  </div>
  <div class="row">
    <span class="label">display-md · 36px</span>
    <span class="sample" style="font-size:36px;line-height:40px;font-weight:400;">Citizenship by Investment</span>
  </div>
  <div class="row">
    <span class="label">h1 / h2 · 48–36px</span>
    <span class="sample" style="font-size:36px;line-height:40px;font-weight:400;font-style:italic;">Advisory Services</span>
  </div>
</body>
</html>
