<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4pt base grid — space-1 (4px) through space-16 (64px)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 0; }
  .item { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-right: 20px; }
  .bar { background: var(--primary); width: 20px; }
  .label { font-size: 10px; font-family: var(--font-mono); color: var(--muted-foreground); white-space: nowrap; }
  .px { font-size: 10px; font-weight: 600; color: var(--foreground); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><span class="px">4</span><span class="label">–1</span></div>
  <div class="item"><div class="bar" style="height:8px"></div><span class="px">8</span><span class="label">–2</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span class="px">12</span><span class="label">–3</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span class="px">16</span><span class="label">–4</span></div>
  <div class="item"><div class="bar" style="height:20px"></div><span class="px">20</span><span class="label">–5</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span class="px">24</span><span class="label">–6</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span class="px">32</span><span class="label">–8</span></div>
  <div class="item"><div class="bar" style="height:40px"></div><span class="px">40</span><span class="label">–10</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span class="px">48</span><span class="label">–12</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span class="px">64</span><span class="label">–16</span></div>
  <div class="item"><div class="bar" style="height:80px; background:var(--electric-blue-400)"></div><span class="px">80</span><span class="label">–20</span></div>
  <div class="item"><div class="bar" style="height:96px; background:var(--electric-blue-400)"></div><span class="px">96</span><span class="label">–24</span></div>
</div>
</body>
</html>
