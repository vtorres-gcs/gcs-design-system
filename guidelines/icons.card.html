<!-- @dsCard group="Iconography" viewport="960x700" name="Icon Set" subtitle="Google Material Icons · 5 variants" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Set — Material Icons</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="../_ds_bundle.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--background);
      color: var(--foreground);
      padding: 28px 32px 48px;
    }

    .header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px; }

    h1 {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 400;
      color: var(--night-blue-400);
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--muted-foreground);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 340px; }

    .search-ic {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted-foreground);
      font-family: 'Material Icons';
      font-size: 16px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 7px 12px 7px 32px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--foreground);
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
    }
    input[type="search"]:focus { border-color: var(--electric-blue-400); }

    .seg {
      display: flex;
      border: 1px solid var(--border);
    }

    .seg-btn {
      padding: 6px 11px;
      font-size: 12px;
      font-family: var(--font-sans);
      background: var(--card);
      color: var(--muted-foreground);
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      transition: all 120ms ease-out;
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active, .seg-btn:hover {
      background: var(--night-blue-400);
      color: #fff;
    }

    .count {
      font-size: 12px;
      color: var(--muted-foreground);
      margin-left: auto;
      white-space: nowrap;
    }

    .categories {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .cat-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-family: var(--font-sans);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 120ms ease-out;
    }
    .cat-btn.active {
      background: var(--night-blue-400);
      color: #fff;
      border-color: var(--night-blue-400);
    }
    .cat-btn:hover:not(.active) { border-color: var(--electric-blue-400); color: var(--electric-blue-400); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 2px;
    }

    .icon-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 14px 6px 10px;
      background: var(--card);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 120ms, background 120ms;
    }
    .icon-cell:hover { border-color: var(--electric-blue-400); background: hsl(216 100% 97%); }
    .icon-cell.copied { border-color: #16a34a; background: hsl(142 60% 96%); }

    .icon-glyph {
      line-height: 1;
      display: block;
      color: var(--night-blue-400);
      user-select: none;
    }

    .icon-label {
      font-size: 9.5px;
      font-family: var(--font-mono);
      color: var(--muted-foreground);
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
    }
    .icon-cell:hover .icon-label { color: var(--electric-blue-400); }

    .empty {
      grid-column: 1/-1;
      padding: 56px;
      text-align: center;
      color: var(--muted-foreground);
      font-size: 14px;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--night-blue-400);
      color: #fff;
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 7px 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms, transform 180ms;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>Material Icons</h1>

<div class="controls">

    <button class="seg-btn" data-v="material-icons-round">Round</button>
    <button class="seg-btn" data-v="material-icons-sharp">Sharp</button>
    <button class="seg-btn" data-v="material-icons-two-tone">Two Tone</button>
  </div>

  <div class="seg" id="sizes">
    <button class="seg-btn" data-sz="16">16</button>
    <button class="seg-btn active" data-sz="24">24</button>
    <button class="seg-btn" data-sz="32">32</button>
  </div>

  <span class="count" id="count"></span>
</div>

<div class="categories" id="cats"></div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

    'layers','local_airport','local_atm','local_hospital','local_offer',
    'local_shipping','location_on','map','my_location','navigation',
    'near_me','person_pin','pin_drop','place','restaurant',
    'satellite','store','terrain','traffic','zoom_out_map',
    'flight_land','flight_takeoff','travel_explore','route',
  ],
};

const ALL_CATS = Object.keys(ICONS);
let currentCat = 'All';
let currentVariant = 'material-icons';
let currentSize = 24;

function getFiltered(q) {
  let pool = currentCat === 'All'
    ? Object.values(ICONS).flat()
    : ICONS[currentCat] || [];
  // Dedupe
  pool = [...new Set(pool)];
  if (!q) return pool;
  const lq = q.toLowerCase();
  return pool.filter(n => n.includes(lq));
}

// Build category buttons
const catsEl = document.getElementById('cats');
['All', ...ALL_CATS].forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat;
    render(document.getElementById('search').value);
  });
  catsEl.appendChild(btn);
});

function render(q = '') {
  const icons = getFiltered(q.trim().toLowerCase());
  const grid = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${icons.length} icon${icons.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';

  if (!icons.length) {
    grid.innerHTML = '<div class="empty">No icons match your search.</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  icons.forEach(name => {
    const cell = document.createElement('div');
    cell.className = 'icon-cell';
    cell.title = name;

    const glyph = document.createElement('span');
    glyph.className = `icon-glyph ${currentVariant}`;
    glyph.style.fontSize = currentSize + 'px';
    glyph.textContent = name;
    cell.appendChild(glyph);

    const label = document.createElement('div');
    label.className = 'icon-label';
    label.textContent = name;
    cell.appendChild(label);

    cell.addEventListener('click', () => {
      navigator.clipboard.writeText(name).then(() => {
        showToast(`Copied "${name}"`);
        cell.classList.add('copied');
        setTimeout(() => cell.classList.remove('copied'), 1100);
      });
    });

    frag.appendChild(cell);
  });
  grid.appendChild(frag);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// Search
document.getElementById('search').addEventListener('input', e => render(e.target.value));

// Variant
document.getElementById('variants').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  document.querySelectorAll('#variants .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentVariant = btn.dataset.v;
  document.querySelectorAll('.icon-glyph').forEach(g => {
    g.className = `icon-glyph ${currentVariant}`;
  });
});

// Size
document.getElementById('sizes').addEventListener('click', e => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  document.querySelectorAll('#sizes .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSize = parseInt(btn.dataset.sz, 10);
  document.querySelectorAll('.icon-glyph').forEach(g => {
    g.style.fontSize = currentSize + 'px';
  });
});

render();
</script>
</body>
</html>
