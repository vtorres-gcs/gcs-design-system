<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<template id="__bundler_thumbnail" data-bg-color="#0a0b12">
  <svg viewBox="0 0 480 740" xmlns="http://www.w3.org/2000/svg">
    <rect width="480" height="740" fill="#0a0b12"/>
    <!-- Slide card -->
    <rect x="120" y="80" width="240" height="300" rx="4" fill="#000957"/>
    <rect x="120" y="80" width="240" height="140" fill="#1a2268"/>
    <!-- GCS starburst simplified -->
    <polygon points="240,100 244,118 260,108 251,122 265,130 248,130 248,148 240,134 232,148 232,130 215,130 229,122 220,108 236,118" fill="white" opacity="0.9"/>
    <!-- Text lines -->
    <rect x="136" y="240" width="160" height="12" rx="2" fill="white" opacity="0.9"/>
    <rect x="136" y="260" width="120" height="10" rx="2" fill="#3F8CFF" opacity="0.7"/>
    <!-- Dots -->
    <rect x="216" y="400" width="20" height="6" rx="3" fill="#3F8CFF"/>
    <rect x="242" y="401" width="8" height="4" rx="2" fill="#2a2f52"/>
    <rect x="256" y="401" width="8" height="4" rx="2" fill="#2a2f52"/>
    <rect x="270" y="401" width="8" height="4" rx="2" fill="#2a2f52"/>
    <rect x="284" y="401" width="8" height="4" rx="2" fill="#2a2f52"/>
  </svg>
</template>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500&family=Yrsa:wght@400;500&display=swap">
  <x-import component-from-global-scope="image-slot" from="./image-slot.js"></x-import>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0b12; }
  </style>
</helmet>

<div style="width:100vw; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0a0b12; gap:20px; overflow:hidden;">

  <div style="position:relative; width:{{ scaledW }}px; height:{{ scaledH }}px; flex-shrink:0;">
    <div style="position:absolute; top:0; left:0; width:1080px; height:1350px; transform:{{ scaleT }}; transform-origin:top left; overflow:hidden;">

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SLIDE 1 · Cover / Hook — full-bleed photo + overlay  -->
      <!-- ══════════════════════════════════════════════════════ -->
      <div style="display:{{ d0 }}; position:absolute; inset:0; width:1080px; height:1350px;">
        <!-- Background photo -->
        <div style="position:absolute; inset:0; background:#7a8fa0;">
          <image-slot id="s1-bg" style="position:absolute; inset:0; width:1080px; height:1350px; display:block;" shape="rect" placeholder="Drop a destination photo here"></image-slot>
        </div>
        <!-- Dark gradient overlay -->
        <div style="position:absolute; inset:0; background:linear-gradient(to bottom, transparent 28%, rgba(0,9,87,0.72) 52%, rgba(0,6,60,0.95) 100%);"></div>
        <!-- Logo top-left: white symbol -->
        <div style="position:absolute; top:44px; left:44px; z-index:2;">
          <img src="assets/GCS-Symbol-White.svg" style="width:72px; height:72px; object-fit:contain;" alt="GCS"></img>
        </div>
        <!-- Text block -->
        <div style="position:absolute; bottom:0; left:0; right:0; padding:0 52px 72px;">
          <p style="font-family:'Heebo',sans-serif; font-size:18px; font-weight:500; color:#3F8CFF; letter-spacing:0.13em; text-transform:uppercase; margin-bottom:20px;">{{ overline }}</p>
          <h2 style="font-family:'Yrsa',serif; font-size:72px; font-weight:400; color:#ffffff; line-height:1.08; letter-spacing:-0.01em;">{{ coverHeadline }}</h2>
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SLIDE 2 · Content + Image — photo top, white bottom  -->
      <!-- ══════════════════════════════════════════════════════ -->
      <div style="display:{{ d1 }}; position:absolute; inset:0; width:1080px; height:1350px; background:#fff; flex-direction:column;">
        <!-- Photo area top -->
        <div style="position:relative; width:1080px; height:594px; flex-shrink:0; overflow:hidden; background:#c8d0dc;">
          <image-slot id="s2-photo" style="position:absolute; inset:0; width:1080px; height:594px; display:block;" shape="rect" placeholder="Drop a landscape photo here"></image-slot>
          <!-- Logo on photo: white symbol -->
          <div style="position:absolute; top:44px; left:44px; z-index:2;">
            <img src="assets/GCS-Symbol-White.svg" style="width:72px; height:72px; object-fit:contain;" alt="GCS"></img>
          </div>
        </div>
        <!-- White text area -->
        <div style="flex:1; padding:56px 64px 60px; display:flex; flex-direction:column; justify-content:flex-start; gap:32px;">
          <h1 style="font-family:'Yrsa',serif; font-size:74px; font-weight:400; color:#000957; line-height:1.08; letter-spacing:-0.01em;">{{ slide2Headline }}</h1>
          <p style="font-family:'Heebo',sans-serif; font-size:34px; font-weight:300; color:#6b7280; line-height:1.6;">{{ slide2Body }}</p>
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SLIDE 3 · Content — white, text only                 -->
      <!-- ══════════════════════════════════════════════════════ -->
      <div style="display:{{ d2 }}; position:absolute; inset:0; width:1080px; height:1350px; background:#fff;">
        <!-- Logo: blue symbol, no circle -->
        <div style="position:absolute; top:44px; left:44px;">
          <img src="assets/GCS-Symbol-Blue.svg" style="width:72px; height:72px; object-fit:contain;" alt="GCS"></img>
        </div>
        <!-- Text block -->
        <div style="position:absolute; top:380px; left:0; right:0; padding:0 64px; display:flex; flex-direction:column; gap:36px;">
          <h2 style="font-family:'Yrsa',serif; font-size:74px; font-weight:400; color:#000957; line-height:1.08; letter-spacing:-0.01em;">{{ slide3Headline }}</h2>
          <p style="font-family:'Heebo',sans-serif; font-size:34px; font-weight:300; color:#6b7280; line-height:1.6;">{{ slide3Body }}</p>
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SLIDE 4 · Quote                                      -->
      <!-- ══════════════════════════════════════════════════════ -->
      <div style="display:{{ d3 }}; position:absolute; inset:0; width:1080px; height:1350px; background:#fff; flex-direction:column; align-items:center;">
        <!-- Avatar -->
        <div style="position:absolute; top:100px; left:50%; transform:translateX(-50%); width:190px; height:190px; border-radius:50%; overflow:hidden; background:#e8ebf0;">
          <image-slot id="s4-avatar" style="width:190px; height:190px; display:block;" shape="circle" placeholder="Drop photo here"></image-slot>
        </div>
        <!-- Quote -->
        <div style="position:absolute; top:360px; left:0; right:0; padding:0 72px; text-align:center;">
          <p style="font-family:'Yrsa',serif; font-size:54px; font-weight:400; color:#1A2268; line-height:1.22; letter-spacing:-0.01em;">{{ quoteText }}</p>
        </div>
        <!-- Attribution -->
        <div style="position:absolute; bottom:160px; left:0; right:0; text-align:center; display:flex; flex-direction:column; align-items:center; gap:10px;">
          <p style="font-family:'Heebo',sans-serif; font-size:28px; font-weight:500; color:#3F8CFF;">{{ quoteName }}</p>
          <p style="font-family:'Heebo',sans-serif; font-size:22px; font-weight:400; color:#9ca3af;">{{ quoteTitle }}</p>
        </div>
        <!-- Bottom: Secondary logo (wordmark only) -->
        <div style="position:absolute; bottom:52px; left:0; right:0; display:flex; justify-content:center;">
          <img src="assets/GCS-Secondary-Blue.svg" style="height:32px; object-fit:contain;" alt="Global Citizen Solutions"></img>
        </div>
      </div>

      <!-- ══════════════════════════════════════════════════════ -->
      <!-- SLIDE 5 · CTA — dark gradient                        -->
      <!-- ══════════════════════════════════════════════════════ -->
      <div style="display:{{ d4 }}; position:absolute; inset:0; width:1080px; height:1350px; background:linear-gradient(160deg, #0c1563 0%, #000957 35%, #000644 100%); flex-direction:column; align-items:center; justify-content:center; gap:0;">
        <!-- Large logo: white symbol -->
        <img src="assets/GCS-Symbol-White.svg" style="width:104px; height:104px; object-fit:contain; flex-shrink:0;" alt="GCS"></img>
        <!-- Headline -->
        <h2 style="margin-top:64px; font-family:'Yrsa',serif; font-size:80px; font-weight:400; color:#ffffff; text-align:center; line-height:1.1; padding:0 80px;">{{ ctaHeadline }}</h2>
        <!-- Body -->
        <p style="margin-top:36px; font-family:'Heebo',sans-serif; font-size:32px; font-weight:300; color:#9ca3af; text-align:center; line-height:1.6; padding:0 120px;">{{ ctaBody }}</p>
        <!-- Action buttons -->
        <div style="margin-top:64px; display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:center; padding:0 60px;">
          <div style="display:flex; align-items:center; gap:10px; background:#1A2268; padding:16px 28px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M9 21h6M12 3a6 6 0 016 6c0 2.2-1.2 4.1-3 5.2V17H9v-2.8C7.2 13.1 6 11.2 6 9a6 6 0 016-6z"/></svg>
            <span style="font-family:'Heebo',sans-serif; font-size:24px; color:#fff; font-weight:400;">Insightful</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px; padding:16px 28px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span style="font-family:'Heebo',sans-serif; font-size:24px; color:#9ca3af; font-weight:400;">Comment</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px; padding:16px 28px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
            <span style="font-family:'Heebo',sans-serif; font-size:24px; color:#9ca3af; font-weight:400;">Repost</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px; padding:16px 28px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            <span style="font-family:'Heebo',sans-serif; font-size:24px; color:#9ca3af; font-weight:400;">Send</span>
          </div>
        </div>
        <p style="margin-top:60px; font-family:'Yrsa',serif; font-size:52px; font-weight:400; color:#ffffff;">{{ ctaSignoff }}</p>
      </div>

      <!-- Tap zones -->
      <div onClick="{{ prev }}" style="position:absolute; left:0; top:0; width:35%; height:100%; cursor:pointer; z-index:20;"></div>
      <div onClick="{{ next }}" style="position:absolute; right:0; top:0; width:35%; height:100%; cursor:pointer; z-index:20;"></div>
    </div>
  </div>

  <!-- Dots -->
  <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
    <div onClick="{{ go0 }}" style="height:6px; width:{{ dw0 }}px; background:{{ dc0 }}; border-radius:3px; cursor:pointer; transition:all 0.25s ease;"></div>
    <div onClick="{{ go1 }}" style="height:6px; width:{{ dw1 }}px; background:{{ dc1 }}; border-radius:3px; cursor:pointer; transition:all 0.25s ease;"></div>
    <div onClick="{{ go2 }}" style="height:6px; width:{{ dw2 }}px; background:{{ dc2 }}; border-radius:3px; cursor:pointer; transition:all 0.25s ease;"></div>
    <div onClick="{{ go3 }}" style="height:6px; width:{{ dw3 }}px; background:{{ dc3 }}; border-radius:3px; cursor:pointer; transition:all 0.25s ease;"></div>
    <div onClick="{{ go4 }}" style="height:6px; width:{{ dw4 }}px; background:{{ dc4 }}; border-radius:3px; cursor:pointer; transition:all 0.25s ease;"></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 480, &quot;height&quot;: 740 },
  &quot;overline&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;Why UK Pensioners Are Retiring in Spain&quot;,
    &quot;section&quot;: &quot;Slide 1 — Cover&quot;
  },
  &quot;coverHeadline&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;From sunshine to smart pension planning — discover why Spain is the choice for Brits after Brexit.&quot;,
    &quot;section&quot;: &quot;Slide 1 — Cover&quot;
  },
  &quot;slide2Headline&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;Plan B: Moving Abroad for Americans&quot;,
    &quot;section&quot;: &quot;Slide 2 — Photo + Text&quot;
  },
  &quot;slide2Body&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;More Americans than ever are exploring residency and citizenship options abroad — for lifestyle, tax planning, and long-term security.&quot;,
    &quot;section&quot;: &quot;Slide 2 — Photo + Text&quot;
  },
  &quot;slide3Headline&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;Plan B: Moving Abroad for Americans&quot;,
    &quot;section&quot;: &quot;Slide 3 — Text Only&quot;
  },
  &quot;slide3Body&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;More Americans than ever are exploring residency and citizenship options abroad — for lifestyle, tax planning, and long-term security.&quot;,
    &quot;section&quot;: &quot;Slide 3 — Text Only&quot;
  },
  &quot;quoteText&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;\&quot;Imagine, one day you are a citizen of a country, the next, sanctions or restrictions cut you off from your wealth. Diversification — both financial and geographical — isn't just smart, it's protective.\&quot;&quot;,
    &quot;section&quot;: &quot;Slide 4 — Quote&quot;
  },
  &quot;quoteName&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;João Pacheco&quot;,
    &quot;section&quot;: &quot;Slide 4 — Quote&quot;
  },
  &quot;quoteTitle&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;Head of Institutional Client Relations, Global Citizen Solutions&quot;,
    &quot;section&quot;: &quot;Slide 4 — Quote&quot;
  },
  &quot;ctaHeadline&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;What do you think?&quot;,
    &quot;section&quot;: &quot;Slide 5 — CTA&quot;
  },
  &quot;ctaBody&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;Comment down below, share this post with your thoughts, or head over to globalcitizensolutions.com for the full article.&quot;,
    &quot;section&quot;: &quot;Slide 5 — CTA&quot;
  },
  &quot;ctaSignoff&quot;: {
    &quot;editor&quot;: &quot;text&quot;,
    &quot;default&quot;: &quot;Thanks.&quot;,
    &quot;section&quot;: &quot;Slide 5 — CTA&quot;
  }
}">
class Component extends DCLogic {
  state = { current: 0, scale: 0.42 };

  componentDidMount() {
    this.updateScale();
    window.addEventListener('resize', this.updateScale.bind(this));
    document.addEventListener('keydown', this.onKey.bind(this));
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this.updateScale.bind(this));
    document.removeEventListener('keydown', this.onKey.bind(this));
  }

  updateScale() {
    const availW = window.innerWidth * 0.96;
    const availH = (window.innerHeight - 50) * 0.96;
    const scale = Math.min(availW / 1080, availH / 1350, 1);
    this.setState({ scale });
  }

  onKey(e) {
    if (e.key === 'ArrowRight') this.go(this.state.current + 1);
    if (e.key === 'ArrowLeft')  this.go(this.state.current - 1);
  }

  go(n) { this.setState({ current: Math.max(0, Math.min(4, n)) }); }

  renderVals() {
    const { current, scale } = this.state;
    const p = this.props;
    const scaledW = Math.round(1080 * scale);
    const scaledH = Math.round(1350 * scale);
    const disp = i => current === i ? 'flex' : 'none';
    const dc   = i => current === i ? '#3F8CFF' : '#2a2f52';
    const dw   = i => current === i ? 24 : 8;
    return {
      scaleT: `scale(${scale})`, scaledW, scaledH,
      d0: disp(0), d1: disp(1), d2: disp(2), d3: disp(3), d4: disp(4),
      prev: () => this.go(current - 1), next: () => this.go(current + 1),
      go0: () => this.go(0), go1: () => this.go(1), go2: () => this.go(2),
      go3: () => this.go(3), go4: () => this.go(4),
      dc0: dc(0), dc1: dc(1), dc2: dc(2), dc3: dc(3), dc4: dc(4),
      dw0: dw(0), dw1: dw(1), dw2: dw(2), dw3: dw(3), dw4: dw(4),
      overline:      p.overline      ?? 'Why UK Pensioners Are Retiring in Spain',
      coverHeadline: p.coverHeadline ?? 'From sunshine to smart pension planning — discover why Spain is the choice for Brits after Brexit.',
      slide2Headline: p.slide2Headline ?? 'Plan B: Moving Abroad for Americans',
      slide2Body:     p.slide2Body    ?? 'More Americans than ever are exploring residency and citizenship options abroad — for lifestyle, tax planning, and long-term security.',
      slide3Headline: p.slide3Headline ?? 'Plan B: Moving Abroad for Americans',
      slide3Body:     p.slide3Body    ?? 'More Americans than ever are exploring residency and citizenship options abroad — for lifestyle, tax planning, and long-term security.',
      quoteText:  p.quoteText  ?? '"Imagine, one day you are a citizen of a country, the next, sanctions or restrictions cut you off from your wealth."',
      quoteName:  p.quoteName  ?? 'João Pacheco',
      quoteTitle: p.quoteTitle ?? 'Head of Institutional Client Relations, Global Citizen Solutions',
      ctaHeadline: p.ctaHeadline ?? 'What do you think?',
      ctaBody:     p.ctaBody    ?? 'Comment down below, share this post with your thoughts, or head over to globalcitizensolutions.com for the full article.',
      ctaSignoff:  p.ctaSignoff ?? 'Thanks.',
    };
  }
}
</script>
</body>
</html>
