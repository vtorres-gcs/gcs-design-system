<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Google Ads Square 1200×1200" description="Square display ad for Google, 1200×1200px" -->
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Yrsa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="./ds-base.js"></script>
</helmet>
<div style="width:1200px;height:1200px;overflow:hidden;position:relative;display:flex;flex-direction:column;">
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,9,87,0.1) 12.41%,rgb(0,9,87) 86.27%),url(./assets/background.jpg) center/cover no-repeat;"></div>
  <div style="position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 125px;gap:32px;">
    <span style="font-family:'Yrsa',Georgia,serif;font-weight:400;font-size:110px;line-height:0.9;color:#ffffff;text-align:center;white-space:pre-line;align-self:stretch;">{{ title }}</span>
    <sc-if value="{{ showSubtitle }}" hint-placeholder-val="{{ false }}">
      <span style="font-family:'Yrsa',Georgia,serif;font-weight:400;font-size:40px;color:rgba(255,255,255,0.8);text-align:center;letter-spacing:0.02em;">{{ subtitle }}</span>
    </sc-if>
  </div>
  <div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:40px 0;flex-shrink:0;">
    <img src="../../assets/logos/GCS-Secondary-White.svg" style="height:28px;width:auto;object-fit:contain;" alt="Global Citizen Solutions">
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1200, &quot;height&quot;: 1200},
  &quot;title&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Italy Golden Visa: Path to\nItaly Residency&quot;, &quot;section&quot;: &quot;Content&quot;},
  &quot;subtitle&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;globalcitizensolutions.com&quot;, &quot;section&quot;: &quot;Content&quot;},
  &quot;showSubtitle&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;section&quot;: &quot;Content&quot;}
}"></script>
</body>
</html>
